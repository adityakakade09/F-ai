<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FraudGuard AI</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <!-- Style -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-container">

    <div class="auth-card glass-panel">
        <div class="auth-header">
            <i class="fas fa-lock text-primary" style="font-size: 40px; text-shadow: 0 0 15px rgba(99, 102, 241, 0.5);"></i>
            <h2 class="auth-title">Reset Password</h2>
            <p class="auth-subtitle">Type a new secure password</p>
        </div>

        <div th:if="${errorMsg}" class="alert alert-danger">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${errorMsg}"></span>
        </div>

        <form th:action="@{/reset-password}" method="POST">
            <input type="hidden" name="token" th:value="${token}">
            
            <div class="form-group">
                <label for="password" class="form-label">New Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Min. 6 characters" required autofocus>
            </div>

            <button type="submit" class="btn-primary w-100 mt-2 mb-3">
                <i class="fas fa-square-check me-2"></i> Update Password
            </button>
        </form>

        <p class="text-center mt-2 mb-0" style="font-size: 13px; color: var(--text-secondary);">
            Cancel and return to <a th:href="@{/login}" style="color: var(--accent-color); text-decoration: none; font-weight: 600;">Sign In</a>
        </p>
    </div>

</body>
</html>
