<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FraudGuard AI</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <!-- Style -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-container">

    <div class="auth-card glass-panel" style="width: 460px;">
        <div class="auth-header">
            <i class="fas fa-user-plus text-primary" style="font-size: 40px; text-shadow: 0 0 15px rgba(99, 102, 241, 0.5);"></i>
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join the FraudGuard AI Network</p>
        </div>

        <div th:if="${errorMsg}" class="alert alert-danger">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${errorMsg}"></span>
        </div>

        <form th:action="@{/register}" th:object="${user}" method="POST">
            <div class="form-group">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" id="fullName" th:field="*{fullName}" class="form-input" placeholder="e.g. John Doe" required>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" th:field="*{email}" class="form-input" placeholder="e.g. user@domain.com" required>
            </div>

            <div class="form-row row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" th:field="*{username}" class="form-input" placeholder="e.g. johndoe" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="roleName" class="form-label">Account Role</label>
                        <select id="roleName" name="roleName" class="form-input" style="background-color: rgb(15, 23, 42);" required>
                            <option value="ROLE_FRAUD_ANALYST">Fraud Analyst</option>
                            <option value="ROLE_AUDITOR">Auditor</option>
                            <option value="ROLE_SUPER_ADMIN">Super Admin</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" th:field="*{password}" class="form-input" placeholder="Min. 6 characters" required>
            </div>

            <button type="submit" class="btn-primary w-100 mt-2 mb-3">
                <i class="fas fa-user-plus me-2"></i> Register Account
            </button>
        </form>

        <p class="text-center mt-2 mb-0" style="font-size: 13px; color: var(--text-secondary);">
            Already have an account? <a th:href="@{/login}" style="color: var(--accent-color); text-decoration: none; font-weight: 600;">Sign In</a>
        </p>
    </div>

</body>
</html>
