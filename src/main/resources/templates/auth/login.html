<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FraudGuard AI</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <!-- Style -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-container">

    <div class="auth-card glass-panel">
        <div class="auth-header">
            <i class="fas fa-shield-halved text-primary" style="font-size: 40px; text-shadow: 0 0 15px rgba(99, 102, 241, 0.5);"></i>
            <h2 class="auth-title">FraudGuard AI</h2>
            <p class="auth-subtitle">Enterprise Fraud Monitoring Platform</p>
        </div>

        <!-- Success Messages -->
        <div th:if="${successMsg}" class="alert alert-success">
            <i class="fas fa-circle-check"></i>
            <span th:text="${successMsg}"></span>
        </div>
        <div th:if="${flashSuccessMsg}" class="alert alert-success">
            <i class="fas fa-circle-check"></i>
            <span th:text="${flashSuccessMsg}"></span>
        </div>

        <!-- Error Messages -->
        <div th:if="${errorMsg}" class="alert alert-danger">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${errorMsg}"></span>
        </div>

        <form th:action="@{/login}" method="POST">
            <div class="form-group">
                <label for="username" class="form-label">Username / Email</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="e.g. admin@fraudguard.ai" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <a th:href="@{/forgot-password}" style="font-size: 13px; color: var(--accent-color); text-decoration: none;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-primary w-100 mb-3">
                <i class="fas fa-right-to-bracket me-2"></i> Sign In
            </button>
        </form>

        <p class="text-center mt-3 mb-0" style="font-size: 13px; color: var(--text-secondary);">
            Don't have an account? <a th:href="@{/register}" style="color: var(--accent-color); text-decoration: none; font-weight: 600;">Register here</a>
        </p>
    </div>

</body>
</html>
