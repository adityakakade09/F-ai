<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Access Denied - FraudGuard AI</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <!-- Style -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-container">

    <div class="auth-card glass-panel text-center" style="width: 500px;">
        <div class="mb-4">
            <i class="fas fa-hand-holding-hand text-danger" style="font-size: 60px; text-shadow: 0 0 15px rgba(239, 68, 68, 0.4); animation: pulse 2s infinite;"></i>
        </div>
        <h1 class="auth-title text-danger">403 - Access Denied</h1>
        <p class="auth-subtitle mb-4">You do not have permission to access this resource. This action has been logged in the audit trails.</p>
        
        <a th:href="@{/dashboard}" class="btn-primary">
            <i class="fas fa-chevron-left me-2"></i> Return to Dashboard
        </a>
    </div>

</body>
</html>
