<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- 1. HEAD FRAGMENT -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title + ' - FraudGuard AI'}">FraudGuard AI</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <!-- Chart.js (Required for analytics dashboards) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- 2. SIDEBAR FRAGMENT -->
    <div th:fragment="sidebar(activeLink)" class="sidebar">
        <div class="brand-section">
            <i class="fas fa-shield-halved brand-icon"></i>
            <span class="brand-name">FraudGuard AI</span>
        </div>
        
        <ul class="nav-menu">
            <li class="nav-item" th:classappend="${activeLink == 'dashboard'} ? 'active'">
                <a th:href="@{/dashboard}"><i class="fas fa-chart-line"></i> Dashboard</a>
            </li>
            
            <!-- Super Admin only: User Management -->
            <li class="nav-item" sec:authorize="hasRole('SUPER_ADMIN')" th:classappend="${activeLink == 'users'} ? 'active'">
                <a th:href="@{/admin/users}"><i class="fas fa-users-gear"></i> User Settings</a>
            </li>
            
            <li class="nav-item" th:classappend="${activeLink == 'transactions'} ? 'active'">
                <a th:href="@{/transactions}"><i class="fas fa-wallet"></i> Transactions</a>
            </li>
            
            <!-- Analyst & Admin only: Dataset Upload -->
            <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN', 'FRAUD_ANALYST')" th:classappend="${activeLink == 'datasets'} ? 'active'">
                <a th:href="@{/datasets/upload}"><i class="fas fa-cloud-arrow-up"></i> Upload Dataset</a>
            </li>
            
            <li class="nav-item" th:classappend="${activeLink == 'fraud'} ? 'active'">
                <a th:href="@{/fraud/cases}"><i class="fas fa-triangle-exclamation"></i> Fraud Cases</a>
            </li>
            
            <li class="nav-item" th:classappend="${activeLink == 'reports'} ? 'active'">
                <a th:href="@{/reports}"><i class="fas fa-file-invoice"></i> Audit Reports</a>
            </li>
            
            <!-- Auditor & Admin only: Audit Logs -->
            <li class="nav-item" sec:authorize="hasAnyRole('SUPER_ADMIN', 'AUDITOR')" th:classappend="${activeLink == 'audit'} ? 'active'">
                <a th:href="@{/audit/logs}"><i class="fas fa-clipboard-list"></i> System Logs</a>
            </li>
            
            <li class="nav-item" th:classappend="${activeLink == 'notifications'} ? 'active'">
                <a th:href="@{/notifications}"><i class="fas fa-bell"></i> Alerts</a>
            </li>
        </ul>
        
        <div class="user-profile-widget">
            <div class="user-avatar" th:text="${#strings.substring(username != null ? username : 'U', 0, 1).toUpperCase()}">U</div>
            <div class="user-info">
                <div class="user-name" th:text="${username}">username</div>
                <div class="user-role" sec:authorize="hasRole('SUPER_ADMIN')">Super Admin</div>
                <div class="user-role" sec:authorize="hasRole('FRAUD_ANALYST')">Fraud Analyst</div>
                <div class="user-role" sec:authorize="hasRole('AUDITOR')">Auditor</div>
            </div>
        </div>
    </div>

    <!-- 3. TOP NAVBAR FRAGMENT -->
    <div th:fragment="navbar(pageTitle)" class="top-navbar">
        <h1 class="page-title" th:text="${pageTitle}">Page Title</h1>
        
        <div class="nav-actions">
            <!-- Theme Toggle -->
            <button id="theme-toggle" class="action-btn" title="Toggle Theme">
                <i class="fas fa-sun"></i>
            </button>
            
            <!-- Notification Bell -->
            <a th:href="@{/notifications}" class="action-btn" title="Notifications">
                <i class="fas fa-bell"></i>
                <span id="notification-badge" class="badge-dot" th:style="${unreadCount == 0} ? 'display: none;' : 'display: block;'" th:text="${unreadCount}">0</span>
            </a>
            
            <!-- Logout Button -->
            <a th:href="@{/logout}" class="action-btn" title="Sign Out" style="color: #f87171; border-color: rgba(239,68,68,0.2);">
                <i class="fas fa-right-from-bracket"></i>
            </a>
        </div>
    </div>

    <!-- 4. FOOTER FRAGMENT -->
    <footer th:fragment="footer" class="text-center py-4 mt-auto" style="border-top: 1px solid var(--border-color); color: var(--text-muted); font-size: 13px;">
        <p>&copy; 2026 FraudGuard AI Enterprise. All rights reserved.</p>
        
        <!-- JavaScripts -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/js/main.js}"></script>
    </footer>

</body>
</html>
