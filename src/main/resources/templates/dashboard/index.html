<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head('Dashboard')}"></head>
<body>

    <!-- Sidebar -->
    <div th:replace="~{layout/fragments :: sidebar('dashboard')}"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Navbar -->
        <div th:replace="~{layout/fragments :: navbar('Security Analytics Dashboard')}"></div>

        <!-- System Stats Cards Grid -->
        <section class="stats-grid">
            
            <div class="stats-card glass-panel">
                <div class="stats-icon-wrapper" style="background: rgba(99, 102, 241, 0.15); color: #6366f1;">
                    <i class="fas fa-wallet"></i>
                </div>
                <div class="stats-info">
                    <span class="stats-label">Total Transactions</span>
                    <span class="stats-value" th:text="${stats.totalTransactions}">0</span>
                </div>
            </div>
            
            <div class="stats-card glass-panel">
                <div class="stats-icon-wrapper" style="background: rgba(239, 68, 68, 0.15); color: #ef4444;">
                    <i class="fas fa-triangle-exclamation"></i>
                </div>
                <div class="stats-info">
                    <span class="stats-label">Fraud Incidents</span>
                    <span class="stats-value" th:text="${stats.fraudulentTransactions}">0</span>
                </div>
            </div>

            <div class="stats-card glass-panel">
                <div class="stats-icon-wrapper" style="background: rgba(234, 179, 8, 0.15); color: #eab308;">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <div class="stats-info">
                    <span class="stats-label">Fraud Rate</span>
                    <span class="stats-value" th:text="${stats.fraudPercentage + '%'}">0.00%</span>
                </div>
            </div>

            <div class="stats-card glass-panel">
                <div class="stats-icon-wrapper" style="background: rgba(34, 197, 94, 0.15); color: #22c55e;">
                    <i class="fas fa-sack-dollar"></i>
                </div>
                <div class="stats-info">
                    <span class="stats-label">Total Evaluated Volume</span>
                    <span class="stats-value" th:text="${'$' + stats.totalVolume}">$0.00</span>
                </div>
            </div>

        </section>

        <!-- Charts Grid -->
        <section class="charts-grid">
            <!-- Left Chart Card: Trend Analysis -->
            <div class="chart-card glass-panel">
                <h3 class="chart-title"><i class="fas fa-chart-line me-2 text-primary"></i> Monthly Fraud & Volumetric Trends</h3>
                <div style="position: relative; height: 100%; width: 100%;">
                    <canvas id="trendsChart"></canvas>
                </div>
            </div>

            <!-- Right Chart Card: Risk Breakdown -->
            <div class="chart-card glass-panel">
                <h3 class="chart-title"><i class="fas fa-chart-pie me-2 text-danger"></i> Risk Levels Distribution</h3>
                <div style="position: relative; height: 100%; width: 100%;">
                    <canvas id="riskChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer th:replace="~{layout/fragments :: footer}"></footer>
    </main>

    <!-- Inject data safely into window scope for charts.js to consume -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        window.riskDistributionData = /*[[${stats.riskDistribution}]]*/ {};
        window.totalTransactionsCount = /*[[${stats.totalTransactions}]]*/ 0;
        window.fraudulentTransactionsCount = /*[[${stats.fraudulentTransactions}]]*/ 0;
        /*]]>*/
    </script>
    <script th:src="@{/js/charts.js}"></script>
</body>
</html>
